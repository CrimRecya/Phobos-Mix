name: Pull Request Check

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
env:
  BASE_BRANCH: ${{ github.event.pull_request.base.ref }}

jobs:
  FilePath-Check:
    name: FilePath Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v1
        with:
          fetch-depth: 0

      - name: 深度调试
        run: |
          echo "=== 变更文件列表 ==="
          git diff --name-only $BASE_REF HEAD

          echo "=== 文件内容差异 ==="
          git diff $BASE_REF HEAD -- "整合包说明/"

          echo "=== Git 状态 ==="
          git status --porcelain

          echo "=== 文件详细信息 ==="
          ls -l "整合包说明/"

  Changelog-Check:
    name: Changelog Mention
    # If the Minor label is set, then workflow will not be executed
    if: false == contains(github.event.pull_request.labels.*.name, 'Minor')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v1
      - name: Check that Changelog has been updated
        run: |
          # Check that Changelog has been updated
          if (git diff --name-only $(git merge-base origin/$BASE_BRANCH HEAD) | grep -q '^整合包说明/更新改动说明.md$')
          then
            echo "感谢您记得更新变更日志！😋"
            exit 0
          else
            echo "你好像忘了更新变更日志！🧐"
            echo "请在“整合包说明/更新改动说明”中提及您的更改。"
            exit 1
          fi

  Documentation-Check:
    name: Documentation for Changes
    # If the Minor label is set, then workflow will not be executed
    if: false == contains(github.event.pull_request.labels.*.name, 'Minor')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v1
      - name: Check that Documentation has been updated
        run: |
          # Check that Documentation has been updated
          if (git diff --name-only $(git merge-base origin/$BASE_BRANCH HEAD) | grep -q '^整合包说明/额外功能说明.md$')
          then
            echo "感谢您记得更新功能说明！😋"
            exit 0
          else
            echo "你好像忘了更新功能说明！🧐"
            echo "请在“整合包说明/额外功能说明”中提及您的更改。"
            exit 1
          fi
